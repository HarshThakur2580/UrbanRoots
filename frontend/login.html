<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In | UrbanRoots</title>
  <meta name="description" content="Log in to your UrbanRoots account and connect with your local gardening community.">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@700;800&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAV ── */
    nav {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: #fff;
    }

    .nav-logo-icon {
      width: 42px;
      height: 42px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255, 255, 255, 0.4);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .nav-logo-text {
      font-family: 'Poppins', sans-serif;
      font-size: 18px;
      font-weight: 700;
      line-height: 1.1;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
    }

    .nav-links a {
      color: rgba(255, 255, 255, 0.85);
      text-decoration: none;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: #fff;
    }

    .nav-links .nav-btn {
      background: #ffffff;
      border: none;
      border-radius: 25px;
      padding: 9px 22px;
      color: #15803d;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 1px;
      transition: all 0.2s;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }

    .nav-links .nav-btn:hover {
      background: #f0fdf4;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      transform: translateY(-1px);
    }

    /* ── SPLIT LAYOUT ── */
    .layout {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 100vh;
    }

    /* ── LEFT: GARDEN IMAGE ── */
    .left-panel {
      position: relative;
      overflow: hidden;
    }

    .left-panel img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    .left-panel::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom,
          rgba(0, 0, 0, 0.35) 0%,
          rgba(0, 0, 0, 0.1) 40%,
          rgba(0, 0, 0, 0.2) 100%);
    }

    .left-tagline {
      position: absolute;
      bottom: 48px;
      left: 48px;
      z-index: 10;
      color: #fff;
    }

    .left-tagline h2 {
      font-family: 'Poppins', sans-serif;
      font-size: 36px;
      font-weight: 800;
      line-height: 1.15;
      text-shadow: 0 2px 20px rgba(0, 0, 0, 0.4);
    }

    .left-tagline p {
      margin-top: 8px;
      font-size: 15px;
      color: rgba(255, 255, 255, 0.8);
      text-shadow: 0 1px 10px rgba(0, 0, 0, 0.4);
    }

    /* ── RIGHT: FORM PANEL ── */
    .right-panel {
      background: #f0fdf4;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 40px;
      overflow: hidden;
    }

    /* floating leaves injected by botanical.js */

    /* ── FORM CARD ── */
    .form-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 24px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08), 0 4px 16px rgba(0, 0, 0, 0.04);
      position: relative;
      z-index: 2;
      animation: cardIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(24px) scale(0.97);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .card-title {
      font-family: 'Poppins', sans-serif;
      font-size: 32px;
      font-weight: 800;
      color: #16a34a;
      text-align: center;
      margin-bottom: 4px;
    }

    .card-subtitle {
      text-align: center;
      color: #64748b;
      font-size: 14px;
      margin-bottom: 28px;
    }

    /* Error box */
    .error-box {
      display: none;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      text-align: center;
      margin-bottom: 16px;
    }

    /* Field group */
    .field-group {
      margin-bottom: 16px;
    }

    .field-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }

    .field-input-wrap {
      position: relative;
    }

    .field-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      color: #16a34a;
      opacity: 0.7;
    }

    .field-input {
      width: 100%;
      padding: 12px 14px 12px 42px;
      border: 1.5px solid #d1fae5;
      border-radius: 12px;
      background: #f0fdf4;
      color: #1e293b;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    .field-input::placeholder {
      color: #94a3b8;
    }

    .field-input:focus {
      border-color: #16a34a;
      box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.12);
      background: #fff;
    }

    .field-eye {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      color: #94a3b8;
      transition: color 0.2s;
    }

    .field-eye:hover {
      color: #374151;
    }

    /* Remember / Forgot */
    .remember-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 8px 0 20px;
    }

    .remember-row label {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      color: #64748b;
      cursor: pointer;
    }

    .remember-row input[type="checkbox"] {
      accent-color: #16a34a;
      width: 15px;
      height: 15px;
    }

    .forgot-link {
      font-size: 13px;
      color: #16a34a;
      text-decoration: none;
      font-weight: 500;
    }

    .forgot-link:hover {
      text-decoration: underline;
    }

    /* Submit button */
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #16a34a, #22c55e);
      color: #fff;
      border: none;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(22, 163, 74, 0.35);
      font-family: 'Inter', sans-serif;
    }

    .submit-btn:hover {
      background: linear-gradient(135deg, #15803d, #16a34a);
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(22, 163, 74, 0.45);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    /* Signup link */
    .signup-text {
      text-align: center;
      font-size: 13px;
      color: #64748b;
      margin-top: 18px;
    }

    .signup-text a {
      color: #16a34a;
      font-weight: 600;
      text-decoration: none;
    }

    .signup-text a:hover {
      text-decoration: underline;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 18px 0;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e2e8f0;
    }

    .divider span {
      font-size: 12px;
      color: #94a3b8;
      white-space: nowrap;
    }

    /* Social buttons */
    .social-row {
      display: flex;
      justify-content: center;
      gap: 14px;
    }

    .social-btn {
      width: 44px;
      height: 44px;
      border: 1.5px solid #e2e8f0;
      border-radius: 50%;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 18px;
      text-decoration: none;
    }

    .social-btn:hover {
      border-color: #16a34a;
      box-shadow: 0 2px 12px rgba(22, 163, 74, 0.2);
      transform: translateY(-2px);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .left-panel {
        display: none;
      }

      nav {
        padding: 16px 20px;
      }

      .right-panel {
        padding: 80px 20px 40px;
      }
    }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

  <!-- Navigation -->
  <nav>
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-icon"><i class="fa-solid fa-leaf text-emerald-500"></i></div>
      <div class="nav-logo-text">Urban<br>Roots</div>
    </a>
    <div class="nav-links">
      <a href="gardens.html">Explore Gardens</a>
      <a href="register.html" class="nav-btn">Join Us</a>
    </div>
  </nav>

  <!-- Split layout -->
  <div class="layout">

    <!-- Left: Garden image -->
    <div class="left-panel">
      <video id="bg-video" src="images/bg.mp4" autoplay loop muted playsinline
        style="width: 100%; height: 100%; object-fit: cover; object-position: center;"></video>
      <button type="button" id="mute-btn" onclick="toggleMute()"
        style="position: absolute; bottom: 48px; right: 48px; z-index: 20; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: white; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; backdrop-filter: blur(10px); transition: all 0.3s;"><i
          class="fa-solid fa-volume-xmark"></i></button>
      <div class="left-tagline">
        <h2>Grow Together,<br>Thrive Together</h2>
        <p>Your community garden awaits. Let's grow. <i class="fa-solid fa-seedling"></i></p>
      </div>
    </div>

    <!-- Right: Form -->
    <div class="right-panel">
      <!-- Leaves injected by botanical.js -->

      <div class="form-card">
        <div class="card-title">Log In</div>
        <div class="card-subtitle">Welcome back, Gardener! 🌻</div>

        <div id="error-message" class="error-box"></div>

        <form id="loginForm">
          <div class="field-group">
            <label class="field-label" for="email">Email Address</label>
            <div class="field-input-wrap">
              <span class="field-icon"><i class="fa-solid fa-leaf text-emerald-500"></i></span>
              <input type="email" id="email" class="field-input" placeholder="you@example.com" required
                autocomplete="email">
            </div>
          </div>

          <div class="field-group">
            <label class="field-label" for="password">Password</label>
            <div class="field-input-wrap">
              <span class="field-icon"><i class="fa-solid fa-right-to-bracket"></i></span>
              <input type="password" id="password" class="field-input" placeholder="Enter your password" required
                autocomplete="current-password">
              <button type="button" class="field-eye" onclick="togglePassword('password')"
                title="Toggle password">👁</button>
            </div>
          </div>

          <div class="remember-row">
            <label>
              <input type="checkbox" id="remember"> Remember Me
            </label>
            <a href="#" class="forgot-link">Forgot Password?</a>
          </div>

          <button type="submit" class="submit-btn" id="loginBtn">Sign In</button>
        </form>

        <p class="signup-text">Don't have an account? <a href="register.html">Sign Up</a></p>

        <div class="divider"><span>Or sign in with</span></div>

        <div class="social-row">
          <a href="#" class="social-btn" title="Google">
            <svg width="20" height="20" viewBox="0 0 24 24">
              <path
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                fill="#4285F4" />
              <path
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                fill="#34A853" />
              <path
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                fill="#FBBC05" />
              <path
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                fill="#EA4335" />
            </svg>
          </a>
          <a href="#" class="social-btn" title="Facebook">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="#1877F2">
              <path
                d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" />
            </svg>
          </a>
          <a href="#" class="social-btn" title="Apple">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="#000">
              <path
                d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z" />
            </svg>
          </a>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const errorDiv = document.getElementById('error-message');

      errorDiv.style.display = 'none';
      btn.textContent = 'Signing in...';
      btn.disabled = true;

      try {
        const res = await fetch('http://localhost:5000/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Login failed');
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data));
        window.location.href = 'dashboard.html';
      } catch (err) {
        errorDiv.textContent = '⚠️ ' + err.message;
        errorDiv.style.display = 'block';
        btn.textContent = 'Sign In';
        btn.disabled = false;
      }
    });

    function togglePassword(id) {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    function toggleMute() {
      const vid = document.getElementById('bg-video');
      const btnIcon = document.querySelector('#mute-btn i');
      vid.muted = !vid.muted;
      if (vid.muted) {
        btnIcon.className = 'fa-solid fa-volume-xmark';
      } else {
        btnIcon.className = 'fa-solid fa-volume-high';
      }
    }
  </script>
  <script src="js/botanical.js"></script>
</body>

</html>
