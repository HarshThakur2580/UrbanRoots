<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join UrbanRoots | Register</title>
  <meta name="description" content="Create your UrbanRoots account and start growing with your local community.">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@700;800&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAV ── */
    nav {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: rgb(247, 250, 247);
    }

    .nav-logo-icon {
      width: 42px;
      height: 42px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255, 255, 255, 0.4);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .nav-logo-text {
      font-family: 'Poppins', sans-serif;
      font-size: 18px;
      font-weight: 700;
      line-height: 1.1;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
    }

    .nav-links a {
      color: green;
      text-decoration: none;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: #124a26;
    }

    .nav-links .nav-btn {
      background: #ffffff;
      border: none;
      border-radius: 25px;
      padding: 9px 22px;
      color: #15803d;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 1px;
      transition: all 0.2s;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
    }

    .nav-links .nav-btn:hover {
      background: #f0fdf4;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      transform: translateY(-1px);
    }

    /* ── SPLIT LAYOUT ── */
    .layout {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 100vh;
    }

    /* ── LEFT: GARDEN IMAGE ── */
    .left-panel {
      position: relative;
      overflow: hidden;
    }

    .left-panel img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    .left-panel::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom,
          rgba(0, 0, 0, 0.35) 0%,
          rgba(0, 0, 0, 0.1) 40%,
          rgba(15, 80, 30, 0.45) 100%);
    }

    .left-tagline {
      position: absolute;
      bottom: 48px;
      left: 48px;
      z-index: 10;
      color: #fff;
    }

    .left-tagline h2 {
      font-family: 'Poppins', sans-serif;
      font-size: 36px;
      font-weight: 800;
      line-height: 1.15;
      text-shadow: 0 2px 20px rgba(0, 0, 0, 0.4);
    }

    .left-tagline p {
      margin-top: 8px;
      font-size: 15px;
      color: rgba(255, 255, 255, 0.8);
      text-shadow: 0 1px 10px rgba(0, 0, 0, 0.4);
    }

    .left-stats {
      position: absolute;
      bottom: 160px;
      left: 48px;
      z-index: 10;
      display: flex;
      gap: 24px;
    }

    .stat-pill {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 30px;
      padding: 8px 18px;
      color: #fff;
      font-size: 13px;
      font-weight: 500;
    }

    .stat-pill strong {
      font-weight: 700;
      margin-right: 4px;
    }

    /* ── RIGHT: FORM PANEL ── */
    .right-panel {
      background: #f0fdf4;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 40px 40px;
      overflow: hidden;
    }


    /* floating leaves injected by botanical.js */


    /* ── FORM CARD ── */
    .form-card {
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.95);
      border-radius: 24px;
      padding: 36px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08), 0 4px 16px rgba(0, 0, 0, 0.04);
      position: relative;
      z-index: 2;
      animation: cardIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(24px) scale(0.97);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .card-title {
      font-family: 'Poppins', sans-serif;
      font-size: 30px;
      font-weight: 800;
      color: #16a34a;
      text-align: center;
      margin-bottom: 4px;
    }

    .card-subtitle {
      text-align: center;
      color: #64748b;
      font-size: 13px;
      margin-bottom: 24px;
    }

    /* Error/success box */
    .msg-box {
      display: none;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      text-align: center;
      margin-bottom: 14px;
    }

    .msg-box.error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
    }

    .msg-box.success {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #16a34a;
    }

    /* Two-column row */
    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    /* Field group */
    .field-group {
      margin-bottom: 14px;
    }

    .field-label {
      display: block;
      font-size: 12.5px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 5px;
    }

    .field-input-wrap {
      position: relative;
    }

    .field-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 15px;
      color: #16a34a;
      opacity: 0.75;
    }

    .field-input {
      width: 100%;
      padding: 11px 12px 11px 40px;
      border: 1.5px solid #d1fae5;
      border-radius: 12px;
      background: #f0fdf4;
      color: #1e293b;
      font-size: 13.5px;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    .field-input::placeholder {
      color: #94a3b8;
      font-size: 13px;
    }

    .field-input:focus {
      border-color: #16a34a;
      box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.12);
      background: #fff;
    }

    .field-eye {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 15px;
      color: #94a3b8;
      transition: color 0.2s;
    }

    .field-eye:hover {
      color: #374151;
    }

    /* Location row with detect button */
    .location-wrap {
      display: flex;
      gap: 8px;
      align-items: stretch;
    }

    .location-wrap .field-input-wrap {
      flex: 1;
    }

    .detect-btn {
      background: #f0fdf4;
      border: 1.5px solid #d1fae5;
      border-radius: 12px;
      padding: 0 14px;
      color: #16a34a;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 4px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
    }

    .detect-btn:hover {
      background: #dcfce7;
      border-color: #16a34a;
    }

    /* Role select */
    .role-select {
      width: 100%;
      padding: 11px 12px 11px 40px;
      border: 1.5px solid #d1fae5;
      border-radius: 12px;
      background: #f0fdf4;
      color: #1e293b;
      font-size: 13.5px;
      font-family: 'Inter', sans-serif;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
      appearance: none;
    }

    .role-select:focus {
      border-color: #16a34a;
      box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.12);
      background: #fff;
    }

    /* Terms row */
    .terms-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin: 10px 0 18px;
    }

    .terms-row input[type="checkbox"] {
      accent-color: #16a34a;
      width: 15px;
      height: 15px;
      margin-top: 2px;
      flex-shrink: 0;
    }

    .terms-row label {
      font-size: 12px;
      color: #64748b;
      line-height: 1.5;
    }

    .terms-row a {
      color: #16a34a;
      font-weight: 600;
      text-decoration: none;
    }

    .terms-row a:hover {
      text-decoration: underline;
    }

    /* Submit button */
    .submit-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #16a34a, #22c55e);
      color: #fff;
      border: none;
      border-radius: 50px;
      font-size: 13.5px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(22, 163, 74, 0.35);
      font-family: 'Inter', sans-serif;
    }

    .submit-btn:hover {
      background: linear-gradient(135deg, #15803d, #16a34a);
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(22, 163, 74, 0.45);
    }

    .submit-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    /* Login link */
    .login-text {
      text-align: center;
      font-size: 13px;
      color: #64748b;
      margin-top: 16px;
    }

    .login-text a {
      color: #16a34a;
      font-weight: 600;
      text-decoration: none;
    }

    .login-text a:hover {
      text-decoration: underline;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .left-panel {
        display: none;
      }

      nav {
        padding: 16px 20px;
      }

      .right-panel {
        padding: 80px 20px 40px;
      }

      .field-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

  <!-- Navigation -->
  <nav>
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-icon"><i class="fa-solid fa-leaf text-emerald-500"></i></div>
      <div class="nav-logo-text">Urban<br>Roots</div>
    </a>
    <div class="nav-links">
      <a href="gardens.html">Explore Gardens</a>
      <a href="login.html" class="nav-btn">Sign In</a>
    </div>
  </nav>

  <!-- Split layout -->
  <div class="layout">

    <!-- Left: Garden image -->
    <div class="left-panel">
      <video id="bg-video" src="images/bg.mp4" autoplay loop muted playsinline
        style="width: 100%; height: 100%; object-fit: cover; object-position: center;"></video>
      <button type="button" id="mute-btn" onclick="toggleMute()"
        style="position: absolute; bottom: 48px; right: 48px; z-index: 20; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: white; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; backdrop-filter: blur(10px); transition: all 0.3s;"><i
          class="fa-solid fa-volume-xmark"></i></button>

      <!-- Stats pills -->
      <div class="left-stats">
        <div class="stat-pill"><strong>500+</strong> Gardeners</div>
        <div class="stat-pill"><strong>80+</strong> Gardens</div>
        <div class="stat-pill"><strong>Free</strong> to Join</div>
      </div>

      <div class="left-tagline">
        <h2>Plant Seeds,<br>Build Community</h2>
        <p>Join hundreds of urban gardeners near you. 🌻</p>
      </div>
    </div>

    <!-- Right: Form -->
    <div class="right-panel">
      <!-- Leaves injected by botanical.js -->

      <div class="form-card">
        <div class="card-title">Join Us <i class="fa-solid fa-seedling"></i></div>
        <div class="card-subtitle">Create your free UrbanRoots account today</div>

        <div id="msg-box" class="msg-box"></div>

        <form id="registerForm">

          <!-- Name & Email in a row -->
          <div class="field-row">
            <div class="field-group">
              <label class="field-label" for="name">Full Name</label>
              <div class="field-input-wrap">
                <span class="field-icon">👤</span>
                <input type="text" id="name" class="field-input" placeholder="Enter your name" required
                  autocomplete="name">
              </div>
            </div>
            <div class="field-group">
              <label class="field-label" for="email">Email</label>
              <div class="field-input-wrap">
                <span class="field-icon">📧</span>
                <input type="email" id="email" class="field-input" placeholder="Enter your email" required
                  autocomplete="email">
              </div>
            </div>
          </div>

          <!-- Password -->
          <div class="field-group">
            <label class="field-label" for="password">Password</label>
            <div class="field-input-wrap">
              <span class="field-icon"><i class="fa-solid fa-right-to-bracket"></i></span>
              <input type="password" id="password" class="field-input" placeholder="Min. 6 characters" required
                autocomplete="new-password">
              <button type="button" class="field-eye" onclick="togglePassword('password')"
                title="Toggle password">👁</button>
            </div>
          </div>

          <!-- Location -->
          <div class="field-group">
            <label class="field-label" for="location">Your Location</label>
            <div class="location-wrap">
              <div class="field-input-wrap">
                <span class="field-icon"><i class="fa-solid fa-location-dot"></i></span>
                <input type="text" id="location" class="field-input" placeholder="City, State or full address" required>
              </div>
              <button type="button" id="detectLocBtn" class="detect-btn" title="Auto-detect my location">
                <i class="fa-solid fa-location-crosshairs"></i> Detect
              </button>
            </div>
          </div>

          <!-- Terms -->
          <div class="terms-row">
            <input type="checkbox" id="terms" required>
            <label for="terms">
              I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>. I understand this is a
              community platform.
            </label>
          </div>

          <button type="submit" class="submit-btn" id="registerBtn">Create Account</button>
        </form>

        <p class="login-text">Already have an account? <a href="login.html">Sign In</a></p>
      </div>
    </div>
  </div>

  <script>
    // Auto-detect location
    document.getElementById('detectLocBtn').addEventListener('click', () => {
      const locInput = document.getElementById('location');
      const btn = document.getElementById('detectLocBtn');
      if (!navigator.geolocation) {
        locInput.value = 'Geolocation not supported';
        return;
      }
      btn.innerHTML = '<i class="fa-solid fa-hourglass-half"></i> Detecting...';
      locInput.value = '';
      locInput.placeholder = 'Detecting your location...';
      navigator.geolocation.getCurrentPosition(
        (position) => {
          fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${position.coords.latitude}&lon=${position.coords.longitude}`)
            .then(r => r.json())
            .then(d => {
              locInput.value = d.address?.city || d.address?.town || d.address?.state || `${position.coords.latitude.toFixed(4)}, ${position.coords.longitude.toFixed(4)}`;
              btn.innerHTML = '<i class="fa-solid fa-check"></i> Detected';
              setTimeout(() => btn.textContent = '📡 Detect', 2000);
            })
            .catch(() => {
              locInput.value = `${position.coords.latitude.toFixed(4)}, ${position.coords.longitude.toFixed(4)}`;
              btn.textContent = '📡 Detect';
            });
        },
        () => {
          locInput.placeholder = 'City, State or full address';
          btn.textContent = '📡 Detect';
          showMsg('Location access denied. Please enter manually.', 'error');
        }
      );
    });

    // Register form
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const location = document.getElementById('location').value.trim();
      const btn = document.getElementById('registerBtn');

      if (password.length < 6) { showMsg('Password must be at least 6 characters.', 'error'); return; }

      btn.textContent = 'Creating Account...';
      btn.disabled = true;

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password, location })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Registration failed');

        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data));
        showMsg('🎉 Account created! Redirecting...', 'success');
        setTimeout(() => window.location.href = 'dashboard.html', 1200);
      } catch (err) {
        showMsg('⚠️ ' + err.message, 'error');
        btn.textContent = 'Create Account';
        btn.disabled = false;
      }
    });

    function showMsg(text, type) {
      const box = document.getElementById('msg-box');
      box.textContent = text;
      box.className = 'msg-box ' + type;
      box.style.display = 'block';
    }

    function togglePassword(id) {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    function toggleMute() {
      const vid = document.getElementById('bg-video');
      const btnIcon = document.querySelector('#mute-btn i');
      vid.muted = !vid.muted;
      if (vid.muted) {
        btnIcon.className = 'fa-solid fa-volume-xmark';
      } else {
        btnIcon.className = 'fa-solid fa-volume-high';
      }
    }
  </script>
  <script src="js/notifications.js"></script>
  <script src="js/botanical.js"></script>
</body>

</html>
