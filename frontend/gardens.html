<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explore Gardens | UrbanRoots</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@700;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-image: url('images/dashboard-bg.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-color: #f0fdf4;
      color: #1e293b;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .glass {
      background: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.7);
      box-shadow: 0 4px 20px 0 rgba(0, 0, 0, 0.05);
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .glass-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-in {
      animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
    }
    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.2s; }
    .delay-3 { animation-delay: 0.3s; }
    
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="min-h-screen flex flex-col">

  <nav class="glass sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-20">
        <a href="index.html" class="flex items-center gap-3 text-emerald-800 text-xl font-bold" style="font-family: 'Poppins', sans-serif;">
          <div class="w-10 h-10 rounded-full flex items-center justify-center border-2 border-emerald-500 bg-white/50 backdrop-blur-md"><i class="fa-solid fa-leaf text-emerald-500"></i></div>
          UrbanRoots
        </a>
        <div class="flex items-center space-x-6">
          <a href="index.html" class="text-sm font-bold uppercase tracking-wider text-slate-600 hover:text-emerald-600 transition-colors">Home</a>
          <a href="dashboard.html" id="dash-link" class="hidden text-sm font-bold uppercase tracking-wider text-slate-600 hover:text-emerald-600 transition-colors">Dashboard</a>
          <a href="login.html" id="login-link" class="bg-gradient-to-r from-emerald-500 to-green-500 hover:from-emerald-600 hover:to-green-600 text-white px-5 py-2.5 rounded-full text-sm font-bold shadow-lg shadow-emerald-500/30 transition-all">Login</a>
        </div>
      </div>
    </div>
  </nav>

  <main class="flex-grow max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-10">
    
    <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-10 gap-6 animate-in relative z-50">
      <div>
        <h1 class="text-4xl font-bold text-emerald-800" style="font-family: 'Poppins', sans-serif;">Community Gardens</h1>
        <p class="text-slate-600 font-medium mt-2">Discover green spaces and urban farms nearby.</p>
      </div>
      
      <div class="flex flex-col sm:flex-row gap-4 w-full lg:w-auto">
        <div class="relative group flex-grow sm:w-64 z-30">
          <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
          <input type="text" id="gardenSearch" placeholder="Search gardens..." 
            class="w-full bg-white/80 backdrop-blur-md border border-white rounded-2xl py-3.5 pl-12 pr-4 focus:outline-none focus:ring-2 focus:ring-emerald-200 focus:border-emerald-500 transition-all shadow-sm font-medium">
          <div id="searchSuggestions" class="hidden absolute top-full left-0 w-full mt-2 bg-white rounded-2xl shadow-xl border border-slate-100 z-[100] max-h-60 overflow-y-auto custom-scrollbar"></div>
        </div>

        <select id="categoryFilter" class="bg-white/80 backdrop-blur-md border border-white rounded-2xl px-5 py-3.5 shadow-sm font-bold text-slate-700 cursor-pointer focus:outline-none">
          <option value="All">All Categories</option>
          <option value="Community Garden">Community Garden</option>
          <option value="Rooftop">Rooftop</option>
          <option value="Balcony">Balcony</option>
          <option value="Backyard">Backyard</option>
          <option value="Other">Other</option>
        </select>

        <button id="getLocationBtn" class="bg-emerald-500 hover:bg-emerald-600 text-white px-6 py-3.5 rounded-2xl transition-all font-bold flex items-center justify-center gap-2 shadow-lg shadow-emerald-500/20 active:scale-95">
          <i class="fa-solid fa-location-crosshairs"></i> Find Nearby
        </button>
      </div>
    </div>

    <div class="flex gap-4 mb-8 border-b border-emerald-100/30 pb-4 overflow-x-auto animate-in">
      <button onclick="switchTab('all')" id="tab-all" class="bg-emerald-500 text-white px-6 py-2 rounded-full font-bold shadow-lg shadow-emerald-500/20 transition-all text-sm">All Gardens</button>
      <button onclick="switchTab('my')" id="tab-my" class="bg-white/50 text-slate-600 hover:bg-white hover:text-emerald-600 px-6 py-2 rounded-full font-bold transition-all hidden text-sm">My Gardens</button>
    </div>

    <div id="gardensGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      <div class="col-span-full text-center py-16 glass-card rounded-2xl animate-in delay-2">
        <div class="text-4xl mb-4 animate-pulse">🌍</div>
        <p class="text-slate-500 font-bold text-lg animate-pulse">Loading nearby gardens...</p>
      </div>
    </div>

  </main>

  <!-- Modal for Editing Garden -->
  <div id="editGardenModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[100] flex justify-center items-center p-4 sm:p-8 transition-opacity">
    <div class="bg-white/95 backdrop-blur-xl w-full max-w-4xl rounded-3xl shadow-2xl relative flex overflow-hidden animate-in">
      <button onclick="document.getElementById('editGardenModal').classList.add('hidden')" class="absolute top-5 right-5 text-slate-400 hover:text-rose-500 text-4xl leading-none transition-colors z-20">&times;</button>
      <div class="w-full p-8 sm:p-12 max-h-[90vh] overflow-y-auto custom-scrollbar">
        <h2 class="text-3xl font-bold text-emerald-600 mb-6" style="font-family: 'Poppins', sans-serif;">Edit Garden Details</h2>
        <form id="editGardenForm" class="space-y-5">
          <input type="hidden" id="editId">
          <div>
            <label class="block text-sm font-bold text-slate-700 mb-2">Garden Name</label>
            <input type="text" id="editName" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:border-emerald-500 transition-all">
          </div>
          <div>
            <label class="block text-sm font-bold text-slate-700 mb-2">Description</label>
            <textarea id="editDesc" required rows="3" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:border-emerald-500 transition-all resize-none"></textarea>
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
            <div>
              <label class="block text-sm font-bold text-slate-700 mb-2">Category</label>
              <select id="editType" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:border-emerald-500">
                <option value="Community Garden">Community Garden</option>
                <option value="Rooftop">Rooftop</option>
                <option value="Balcony">Balcony</option>
                <option value="Backyard">Backyard</option>
                <option value="Other">Other</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-bold text-slate-700 mb-2">Entry Fee (₹)</label>
              <input type="number" id="editFee" required min="0" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:border-emerald-500">
            </div>
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
            <div>
              <label class="block text-sm font-bold text-slate-700 mb-2">Opening Time</label>
              <input type="time" id="editOpeningTime" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:border-emerald-500 transition-all">
            </div>
            <div>
              <label class="block text-sm font-bold text-slate-700 mb-2">Closing Time</label>
              <input type="time" id="editClosingTime" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:border-emerald-500 transition-all">
            </div>
          </div>
          <div>
            <label class="block text-sm font-bold text-slate-700 mb-2">Address</label>
            <input type="text" id="editAddress" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:border-emerald-500 transition-all">
          </div>
          <div>
            <label class="block text-sm font-bold text-slate-700 mb-2">Add Images (Up to 5)</label>
            <input type="file" id="editImages" multiple accept="image/*" class="w-full text-sm">
          </div>
          <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white rounded-xl px-4 py-4 font-bold transition-all shadow-lg shadow-emerald-500/20 mt-4 uppercase">Save Changes</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    let allGardens = [];
    let currentTab = 'all';

    document.addEventListener("DOMContentLoaded", () => {
      const token = localStorage.getItem('token');
      if (token) {
        document.getElementById('dash-link').classList.remove('hidden');
        document.getElementById('login-link').classList.add('hidden');
        document.getElementById('tab-my').classList.remove('hidden');
      }
      fetchGardens();
    });

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('#tab-all, #tab-my').forEach(btn => {
        btn.className = "bg-white/50 text-slate-600 hover:bg-white hover:text-emerald-600 px-6 py-2 rounded-full font-bold transition-all text-sm";
      });
      document.getElementById(`tab-${tab}`).className = "bg-emerald-500 text-white px-6 py-2 rounded-full font-bold shadow-lg shadow-emerald-500/20 transition-all text-sm";
      
      if (tab === 'my') {
        const user = JSON.parse(localStorage.getItem('user'));
        const myGardens = allGardens.filter(g => g.owner?._id === user?._id);
        renderGardens(myGardens, true);
      } else {
        renderGardens(allGardens);
      }
    }

    document.getElementById('getLocationBtn').addEventListener('click', () => {
      const btn = document.getElementById('getLocationBtn');
      const originalHTML = btn.innerHTML;
      btn.innerHTML = `<i class="fa-solid fa-hourglass-half animate-spin"></i> Detecting...`;
      btn.disabled = true;

      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(position => {
          fetchGardens(position.coords.latitude, position.coords.longitude);
          btn.innerHTML = `<i class="fa-solid fa-check"></i> Found Nearby`;
          setTimeout(() => {
            btn.innerHTML = originalHTML;
            btn.disabled = false;
          }, 2000);
        }, error => {
          btn.innerHTML = originalHTML;
          btn.disabled = false;
          showToast('Could not get location. Ensure location services are enabled.', 'warn');
        });
      }
    });

    async function fetchGardens(lat = null, lng = null) {
      const grid = document.getElementById('gardensGrid');
      grid.innerHTML = `
        <div class="col-span-full text-center py-16 glass-card rounded-2xl animate-in">
          <div class="text-4xl mb-4 animate-pulse"><i class="fa-solid fa-seedling text-emerald-500"></i></div>
          <p class="text-emerald-600 font-bold text-lg animate-pulse">Searching the city for green spaces...</p>
        </div>
      `;
      
      let url = 'http://localhost:5000/api/gardens';
      if (lat && lng) url += `?lat=${lat}&lng=${lng}`;

      try {
        const res = await fetch(url);
        allGardens = await res.json();
        if (currentTab === 'all') renderGardens(allGardens);
        else switchTab('my');
      } catch (e) {
        console.error(e);
        grid.innerHTML = `<div class="col-span-full text-center py-8 text-rose-500 font-bold">Failed to load gardens. Please try again.</div>`;
      }
    }

    function renderGardens(gardens, isMyTab = false) {
      const grid = document.getElementById('gardensGrid');
      grid.innerHTML = '';
      const user = JSON.parse(localStorage.getItem('user'));

      if (gardens.length === 0) {
        grid.innerHTML = `
          <div class="col-span-full text-center py-16 glass-card rounded-2xl animate-in">
            <div class="text-4xl mb-3">🍂</div>
            <p class="text-slate-700 font-bold mb-1">${isMyTab ? "You haven't listed any gardens yet." : "No gardens found."}</p>
            <p class="text-sm text-slate-500 font-medium">Try adjusting your search or filters.</p>
          </div>
        `;
        return;
      }

      gardens.forEach((garden, index) => {
        const defaultImg = "https://images.unsplash.com/photo-1585320806297-9794b3e4ce11?auto=format&fit=crop&q=80&w=600";
        const images = (garden.images && garden.images.length > 0) ? garden.images : [defaultImg];
        const delayClass = `delay-${(index % 3) + 1}`;
        const ownerId = garden.owner?._id || garden.owner;
        const currentUserId = user?._id || user?.id;
        const isOwner = currentUserId && ownerId === currentUserId;
        
        grid.innerHTML += `
          <div class="glass-card overflow-hidden hover:-translate-y-2 transition-all duration-300 group animate-in ${delayClass}">
            <div class="h-48 overflow-hidden relative">
              <div class="slides-container" id="slides-${garden._id}" style="display: flex; transition: transform 0.5s ease; width: 100%; height: 100%;">
                ${images.map(img => `<img src="${img}" class="min-w-full h-full object-cover">`).join('')}
              </div>
              
              ${images.length > 1 ? `
                <button onclick="event.preventDefault(); moveGardenSlide('${garden._id}', -1)" class="absolute left-2 top-1/2 -translate-y-1/2 bg-white/20 hover:bg-white/50 text-white w-8 h-8 rounded-full flex items-center justify-center backdrop-blur-sm z-30 transition-all opacity-0 group-hover:opacity-100"><i class="fa-solid fa-chevron-left"></i></button>
                <button onclick="event.preventDefault(); moveGardenSlide('${garden._id}', 1)" class="absolute right-2 top-1/2 -translate-y-1/2 bg-white/20 hover:bg-white/50 text-white w-8 h-8 rounded-full flex items-center justify-center backdrop-blur-sm z-30 transition-all opacity-0 group-hover:opacity-100"><i class="fa-solid fa-chevron-right"></i></button>
                <div class="absolute bottom-2 left-1/2 -translate-x-1/2 flex gap-1 z-30">
                  ${images.map((_, i) => `<div class="w-1.5 h-1.5 rounded-full bg-white/40 ${i === 0 ? 'bg-white scale-125' : ''}" id="dot-${garden._id}-${i}"></div>`).join('')}
                </div>
              ` : ''}

              <div class="absolute inset-0 bg-gradient-to-t from-slate-900/60 via-transparent to-transparent opacity-80 pointer-events-none"></div>
              <div class="absolute top-4 right-4 bg-white/90 backdrop-blur-md px-3 py-1 rounded-full text-xs font-bold text-emerald-700 shadow-md z-20">
                ${garden.type}
              </div>
              ${isOwner ? '<div class="absolute top-4 left-4 bg-emerald-500 text-white px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest shadow-lg z-20">Your Garden</div>' : ''}
            </div>
            <div class="p-6">
              <div class="flex justify-between items-start mb-2">
                <h3 class="text-xl font-bold text-emerald-800 truncate" style="font-family: 'Poppins', sans-serif;">${garden.name}</h3>
                ${garden.openingTime ? `<span class="bg-emerald-50 text-emerald-700 px-2 py-0.5 rounded text-[10px] font-bold border border-emerald-100 flex items-center gap-1"><i class="fa-regular fa-clock"></i> ${garden.openingTime}-${garden.closingTime}</span>` : ''}
              </div>
              <p class="text-sm text-slate-500 font-medium line-clamp-2 mb-5 h-10">${garden.description || 'A beautiful community garden.'}</p>
              
              <div class="flex justify-between items-center text-sm mb-5 bg-white/50 rounded-xl p-3 border border-white/60">
                <span class="text-amber-500 font-bold flex items-center gap-1">
                  <span>★</span> ${garden.ratingsAverage > 0 ? garden.ratingsAverage : 'New'} <span class="text-slate-400 font-medium text-xs">(${garden.ratingsQuantity})</span>
                </span>
                <span class="font-bold ${garden.entryFee > 0 ? 'text-slate-700' : 'text-emerald-600'}">
                  ${garden.entryFee > 0 ? '₹' + garden.entryFee : 'Free Entry'}
                </span>
              </div>
              
              <div class="flex gap-2">
                <a href="garden-detail.html?id=${garden._id}" class="flex-grow text-center bg-emerald-50 hover:bg-emerald-500 text-emerald-700 hover:text-white border border-emerald-200 hover:border-emerald-500 py-2.5 rounded-xl text-sm font-bold transition-all shadow-sm">
                  View
                </a>
                ${isOwner ? `
                  <button onclick="openEditGardenModal('${garden._id}')" class="bg-white hover:bg-slate-50 text-slate-600 px-4 py-2.5 rounded-xl border border-slate-200 transition-all"><i class="fa-solid fa-pen-to-square"></i></button>
                  <button onclick="deleteGarden('${garden._id}')" class="bg-rose-50 text-rose-500 hover:bg-rose-500 hover:text-white border border-rose-200 px-4 py-2.5 rounded-xl transition-all"><i class="fa-solid fa-trash-can"></i></button>
                ` : ''}
              </div>
            </div>
          </div>
        `;
      });
    }

    const gardenSlideIndexes = {};
    window.moveGardenSlide = (id, dir) => {
      if (!gardenSlideIndexes[id]) gardenSlideIndexes[id] = 0;
      const container = document.getElementById(`slides-${id}`);
      const count = container.children.length;
      gardenSlideIndexes[id] = (gardenSlideIndexes[id] + dir + count) % count;
      container.style.transform = `translateX(-${gardenSlideIndexes[id] * 100}%)`;
      for(let i=0; i<count; i++) {
        const dot = document.getElementById(`dot-${id}-${i}`);
        if(dot) dot.className = `w-1.5 h-1.5 rounded-full ${i === gardenSlideIndexes[id] ? 'bg-white scale-125' : 'bg-white/40'}`;
      }
    };

    window.openEditGardenModal = (id) => {
      const garden = allGardens.find(g => g._id === id);
      if (!garden) return;
      document.getElementById('editId').value = garden._id;
      document.getElementById('editName').value = garden.name;
      document.getElementById('editDesc').value = garden.description;
      document.getElementById('editType').value = garden.type;
      document.getElementById('editFee').value = garden.entryFee;
      document.getElementById('editAddress').value = garden.address || '';
      document.getElementById('editOpeningTime').value = garden.openingTime || '';
      document.getElementById('editClosingTime').value = garden.closingTime || '';
      document.getElementById('editGardenModal').classList.remove('hidden');
    };

    document.getElementById('editGardenForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('editId').value;
      const formData = new FormData();
      formData.append('name', document.getElementById('editName').value);
      formData.append('description', document.getElementById('editDesc').value);
      formData.append('type', document.getElementById('editType').value);
      formData.append('entryFee', document.getElementById('editFee').value);
      formData.append('address', document.getElementById('editAddress').value);
      formData.append('openingTime', document.getElementById('editOpeningTime').value);
      formData.append('closingTime', document.getElementById('editClosingTime').value);
      
      const files = document.getElementById('editImages').files;
      for (let i = 0; i < files.length; i++) formData.append('images', files[i]);

      try {
        const res = await fetch(`http://localhost:5000/api/gardens/${id}`, {
          method: 'PUT',
          headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` },
          body: formData
        });
        if (res.ok) {
          showToast('Garden updated successfully!', 'success');
          document.getElementById('editGardenModal').classList.add('hidden');
          fetchGardens();
        }
      } catch (err) { showToast(err.message, 'error'); }
    });

    window.deleteGarden = async (id) => {
      showConfirm(
        'Are you sure you want to delete this garden? This action cannot be undone.',
        async () => {
          try {
            const res = await fetch(`http://localhost:5000/api/gardens/${id}`, {
              method: 'DELETE',
              headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
            });
            if (res.ok) {
              showToast('Garden deleted.', 'success');
              fetchGardens();
            }
          } catch (err) { showToast(err.message, 'error'); }
        },
        { title: 'Delete Garden?', icon: '<i class="fa-solid fa-trash-can text-rose-500"></i>', confirmText: 'Delete' }
      );
    };

    const searchInput = document.getElementById('gardenSearch');
    const categoryFilter = document.getElementById('categoryFilter');
    const suggestionsEl = document.getElementById('searchSuggestions');

    function applyFilters() {
      const term = searchInput.value.toLowerCase();
      const cat = categoryFilter.value;
      const baseList = currentTab === 'all' ? allGardens : allGardens.filter(g => g.owner?._id === JSON.parse(localStorage.getItem('user'))?._id);
      const filtered = baseList.filter(g => {
        const matchesSearch = g.name.toLowerCase().includes(term) || (g.address && g.address.toLowerCase().includes(term));
        const matchesCat = cat === 'All' || g.type === cat;
        return matchesSearch && matchesCat;
      });
      renderGardens(filtered, currentTab === 'my');
      showSuggestions(term);
    }

    function showSuggestions(term) {
      if (!term) { suggestionsEl.classList.add('hidden'); return; }
      const matches = allGardens.filter(g => g.name.toLowerCase().includes(term)).slice(0, 5);
      if (matches.length > 0) {
        suggestionsEl.innerHTML = matches.map(m => `
          <div class="px-4 py-3 hover:bg-emerald-50 cursor-pointer border-b border-slate-50 last:border-0" onclick="selectSuggestion('${m.name}')">
            <p class="font-bold text-slate-800 text-sm">${m.name}</p>
            <p class="text-xs text-slate-500 font-medium">${m.type}</p>
          </div>
        `).join('');
        suggestionsEl.classList.remove('hidden');
      } else { suggestionsEl.classList.add('hidden'); }
    }

    window.selectSuggestion = (val) => {
      searchInput.value = val;
      suggestionsEl.classList.add('hidden');
      applyFilters();
    };

    searchInput.addEventListener('input', applyFilters);
    categoryFilter.addEventListener('change', applyFilters);
    document.addEventListener('click', (e) => {
      if (!searchInput.contains(e.target) && !suggestionsEl.contains(e.target)) suggestionsEl.classList.add('hidden');
    });
  </script>
  <script src="js/notifications.js"></script>
