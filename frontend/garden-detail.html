<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Garden Details | UrbanRoots</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-image: url('images/dashboard-bg.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-color: #f0fdf4;
      color: #1e293b;
      padding-left: 70px;
    }
    
    .glass-card {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 24px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
    }

    .form-input {
      background: rgba(255, 255, 255, 0.6);
      border: 1px solid rgba(16, 185, 129, 0.2);
      border-radius: 12px;
      color: #1e293b;
      transition: all 0.2s;
    }
    .form-input:focus {
      background: rgba(255, 255, 255, 0.9);
      border-color: #10b981;
      outline: none;
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
    }
    
    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="min-h-screen flex flex-col antialiased">

  <main class="flex-grow max-w-5xl mx-auto w-full px-4 py-10" id="detailContainer">
    <div class="flex justify-center items-center h-64">
      <p class="text-emerald-600 font-bold text-xl animate-pulse"><i class="fa-solid fa-seedling"></i> Loading garden details...</p>
    </div>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const urlParams = new URLSearchParams(window.location.search);
      const gardenId = urlParams.get('id');
      
      if (!gardenId) {
        document.getElementById('detailContainer').innerHTML = `
          <div class="glass-card p-12 text-center">
            <i class="fa-solid fa-circle-exclamation text-rose-500 text-5xl mb-4"></i>
            <h2 class="text-2xl font-bold text-slate-800">Garden Not Found</h2>
            <p class="text-slate-500 mt-2">The garden ID is missing from the URL.</p>
            <a href="gardens.html" class="inline-block mt-6 bg-emerald-500 text-white px-6 py-2 rounded-full font-bold">Go Back</a>
          </div>`;
        return;
      }

      try {
        const res = await fetch(`http://localhost:5000/api/gardens/${gardenId}`);
        if (!res.ok) throw new Error("Garden not found");
        const garden = await res.json();
        
        const defaultImg = "images/garden-hero.png";
        const coverImg = garden.images && garden.images.length > 0 ? garden.images[0] : defaultImg;

        document.getElementById('detailContainer').innerHTML = `
          <!-- Header Image & Title -->
          <div class="w-full h-72 md:h-96 rounded-3xl overflow-hidden mb-8 relative shadow-2xl animate-in fade-in duration-500 border-4 border-white/50">
            <img src="${coverImg}" class="w-full h-full object-cover" onerror="this.src='https://images.unsplash.com/photo-1585320806297-9794b3e4ce11?auto=format&fit=crop&q=80&w=1200'">
            <div class="absolute inset-0 bg-gradient-to-t from-emerald-950/80 via-emerald-900/30 to-transparent"></div>
            
            <a href="gardens.html" class="absolute top-6 left-6 bg-white/20 hover:bg-white/40 backdrop-blur-md text-white px-4 py-2 rounded-full text-sm font-bold transition-colors">
              <i class="fa-solid fa-arrow-left mr-2"></i> Back
            </a>

            <div class="absolute bottom-0 left-0 p-8 w-full flex flex-col md:flex-row md:items-end justify-between gap-6">
              <div class="flex-grow">
                <span class="bg-emerald-500 text-white text-xs px-4 py-1.5 rounded-full font-bold uppercase tracking-wide mb-3 inline-block shadow-lg">${garden.type}</span>
                <h1 class="text-4xl md:text-5xl font-extrabold text-white mb-2 drop-shadow-md" style="font-family: 'Poppins', sans-serif;">${garden.name}</h1>
                <p id="gardenAddressDisplay" class="text-lg text-emerald-100 font-medium flex items-center gap-2 drop-shadow-sm">
                  <i class="fa-solid fa-location-dot"></i> 
                  ${garden.address || 'Locating address...'}
                </p>
              </div>
              
              <div class="flex gap-3 shrink-0">
                <a href="tel:${garden.phone || garden.owner?.phone || ''}" 
                   class="bg-white hover:bg-emerald-50 text-emerald-700 px-6 py-3 rounded-2xl font-bold flex items-center gap-2 transition-all shadow-xl hover:scale-105 active:scale-95 ${!(garden.phone || garden.owner?.phone) ? 'opacity-50 pointer-events-none' : ''}">
                  <i class="fa-solid fa-phone"></i> Inquiry
                </a>
                <a href="https://www.google.com/maps/dir/?api=1&destination=${garden.location.coordinates[1]},${garden.location.coordinates[0]}" 
                   target="_blank"
                   class="bg-emerald-500 hover:bg-emerald-600 text-white px-6 py-3 rounded-2xl font-bold flex items-center gap-2 transition-all shadow-xl hover:scale-105 active:scale-95 shadow-emerald-950/20">
                  <i class="fa-solid fa-map-location-dot"></i> Directions
                </a>
              </div>
            </div>
          </div>

          <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Left Column: Details & Reviews -->
            <div class="lg:col-span-2 space-y-8 animate-in slide-in-from-bottom-4 duration-500 delay-150">
              
              <!-- About -->
              <div class="glass-card p-8">
                <h3 class="text-2xl font-bold text-emerald-800 mb-4 flex items-center gap-2" style="font-family: 'Poppins', sans-serif;">
                  <i class="fa-solid fa-circle-info text-emerald-500"></i> About this Garden
                </h3>
                <p class="text-slate-600 leading-relaxed font-medium text-[15px]">${garden.description || 'No description provided.'}</p>
              </div>

              <!-- Reviews Section -->
              <div class="glass-card p-8">
                <h3 class="text-2xl font-bold text-emerald-800 mb-6 flex items-center gap-2" style="font-family: 'Poppins', sans-serif;">
                  <i class="fa-solid fa-star text-yellow-500"></i> Reviews & Ratings
                </h3>
                
                <form id="reviewForm" class="mb-8 p-6 bg-white/40 rounded-2xl border border-white/60 shadow-sm">
                  <h4 class="text-lg font-bold text-emerald-700 mb-4">Leave a Review</h4>
                  <div class="mb-4">
                    <label class="block text-sm font-bold text-slate-700 mb-2">Rating</label>
                    <select id="reviewRating" required class="form-input w-full md:w-1/2 px-4 py-2.5">
                      <option value="5">⭐⭐⭐⭐⭐ Excellent</option>
                      <option value="4">⭐⭐⭐⭐ Very Good</option>
                      <option value="3">⭐⭐⭐ Good</option>
                      <option value="2">⭐⭐ Fair</option>
                      <option value="1">⭐ Poor</option>
                    </select>
                  </div>
                  <div class="mb-4">
                    <label class="block text-sm font-bold text-slate-700 mb-2">Comment</label>
                    <textarea id="reviewComment" rows="3" required class="form-input w-full px-4 py-3" placeholder="Share your experience here..."></textarea>
                  </div>
                  <button type="submit" class="bg-gradient-to-r from-emerald-500 to-green-500 hover:from-emerald-600 hover:to-green-600 text-white px-6 py-2.5 rounded-xl font-bold transition-all shadow-md hover:shadow-lg shadow-emerald-500/20 text-sm">
                    Submit Review <i class="fa-solid fa-paper-plane ml-1"></i>
                  </button>
                </form>

                <div class="space-y-4">
                  ${garden.reviews && garden.reviews.length > 0 ? garden.reviews.map(r => `
                    <div class="bg-white/60 p-5 rounded-2xl border border-white">
                      <div class="flex items-center justify-between mb-3">
                        <div class="flex items-center gap-3">
                          <div class="w-8 h-8 rounded-full bg-emerald-100 flex items-center justify-center text-emerald-700 font-bold text-xs border border-emerald-200">
                            ${(r.user?.name || 'A')[0].toUpperCase()}
                          </div>
                          <div>
                            <div class="font-bold text-slate-800 text-sm">${r.user?.name || 'Anonymous'}</div>
                            <div class="text-xs text-slate-500 font-medium">${new Date(r.date).toLocaleDateString()}</div>
                          </div>
                        </div>
                        <div class="text-yellow-500 text-sm">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div>
                      </div>
                      <p class="text-slate-600 text-sm font-medium leading-relaxed">${r.comment}</p>
                    </div>
                  `).join('') : `
                    <div class="text-center py-8 bg-slate-50/50 rounded-2xl border border-slate-100 border-dashed">
                      <p class="text-slate-500 font-medium">No reviews yet. Be the first to review!</p>
                    </div>
                  `}
                </div>
              </div>
            </div>

            <!-- Right Column: Info & Actions -->
            <div class="space-y-6 animate-in slide-in-from-right-8 duration-500 delay-300">
              <div class="glass-card p-6 sticky top-24">
                <h3 class="text-xl font-bold text-emerald-800 mb-5" style="font-family: 'Poppins', sans-serif;">Information</h3>
                <ul class="space-y-4 text-sm font-medium">
                  <li class="flex items-center justify-between border-b border-emerald-100/50 pb-3">
                    <span class="text-slate-500 flex items-center gap-2"><i class="fa-solid fa-user text-emerald-400"></i> Host</span> 
                    <span class="font-bold text-slate-800">${garden.owner?.name || 'Unknown'}</span>
                  </li>
                  <li class="flex items-center justify-between border-b border-emerald-100/50 pb-3">
                    <span class="text-slate-500 flex items-center gap-2"><i class="fa-regular fa-clock text-blue-400"></i> Hours</span> 
                    <span class="text-slate-800">${garden.openingTime || 'Sunrise'} - ${garden.closingTime || 'Sunset'}</span>
                  </li>
                  <li class="flex items-center justify-between border-b border-emerald-100/50 pb-3">
                    <span class="text-slate-500 flex items-center gap-2"><i class="fa-solid fa-ticket text-rose-400"></i> Entry Fee</span> 
                    <span class="text-emerald-600 font-bold bg-emerald-50 px-2 py-0.5 rounded">${garden.entryFee > 0 ? '₹'+garden.entryFee : 'Free'}</span>
                  </li>
                  <li class="flex items-center justify-between pt-1">
                    <span class="text-slate-500 flex items-center gap-2"><i class="fa-solid fa-star text-yellow-400"></i> Rating</span> 
                    <span class="text-slate-800 font-bold flex items-center gap-1">${garden.ratingsAverage > 0 ? garden.ratingsAverage + ' <span class="text-yellow-500 text-xs">★</span>' : 'Unrated'}</span>
                  </li>
                </ul>
                
                <button onclick="requestToJoin('${garden._id}', '${garden.owner?._id}')" class="mt-8 w-full bg-emerald-500 hover:bg-emerald-600 text-white py-3.5 rounded-xl font-bold transition-colors shadow-lg shadow-emerald-500/30 flex items-center justify-center gap-2">
                  <i class="fa-solid fa-handshake-angle"></i> Request to Join
                </button>
              </div>
            </div>

          </div>
        `;

        // Reverse Geocoding Logic if address is missing
        if (!garden.address) {
          const addressEl = document.getElementById('gardenAddressDisplay');
          try {
            const [lng, lat] = garden.location.coordinates;
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
            const data = await res.json();
            if (data && data.display_name) {
              addressEl.innerHTML = `<i class="fa-solid fa-location-dot"></i> ${data.display_name}`;
            } else {
              addressEl.innerHTML = `<i class="fa-solid fa-location-dot"></i> ${lat.toFixed(3)}, ${lng.toFixed(3)}`;
            }
          } catch (e) {
            console.error("Geocoding error:", e);
            const [lng, lat] = garden.location.coordinates;
            addressEl.innerHTML = `<i class="fa-solid fa-location-dot"></i> ${lat.toFixed(3)}, ${lng.toFixed(3)}`;
          }
        }
      } catch (e) {
        document.getElementById('detailContainer').innerHTML = `
          <div class="glass-card p-12 text-center">
            <i class="fa-solid fa-circle-exclamation text-rose-500 text-5xl mb-4"></i>
            <h2 class="text-2xl font-bold text-slate-800">Error</h2>
            <p class="text-slate-500 mt-2">${e.message}</p>
          </div>`;
      }

      const reviewForm = document.getElementById('reviewForm');
      if (reviewForm) {
        reviewForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          const token = localStorage.getItem('token');
          if (!token) { showToast('Please login to leave a review!', 'warn'); return; }

          const rating = document.getElementById('reviewRating').value;
          const comment = document.getElementById('reviewComment').value;

          try {
            const res = await fetch(`http://localhost:5000/api/gardens/${gardenId}/reviews`, {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({ rating, comment })
            });

            const data = await res.json();
            if (!res.ok) throw new Error(data.message);
            
            showToast('Review submitted! Thank you.', 'success');
            setTimeout(() => window.location.reload(), 1500);
          } catch (err) {
            showToast(err.message, 'error');
          }
        });
      }
    });

    async function requestToJoin(targetId, ownerId) {
      const token = localStorage.getItem('token');
      if (!token) { showToast('Please login to request access!', 'warn'); return; }

      try {
        const res = await fetch('http://localhost:5000/api/requests', {
          method: 'POST',
          headers: { 
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ type: 'Join Garden', targetId, targetModel: 'Garden', ownerId })
        });
        
        if (!res.ok) throw new Error('Failed to send request');
        showToast("Request sent! You'll be emailed when approved.", 'success');
      } catch (err) {
        showToast(err.message, 'error');
      }
    }
  </script>
  <script src="js/notifications.js"></script>
  <script src="js/navbar.js"></script>
</body>
</html>
